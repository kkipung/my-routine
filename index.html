// Storage shim: localStorage wrapper compatible with window.storage API
window.storage = {
  get: function(key) {
    return new Promise(function(resolve) {
      try {
        var val = localStorage.getItem(key);
        resolve(val ? { key: key, value: val } : null);
      } catch(e) { resolve(null); }
    });
  },
  set: function(key, value) {
    return new Promise(function(resolve) {
      try {
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
        resolve({ key: key, value: value });
      } catch(e) { resolve(null); }
    });
  },
  delete: function(key) {
    return new Promise(function(resolve) {
      try { localStorage.removeItem(key); resolve({ key: key, deleted: true }); }
      catch(e) { resolve(null); }
    });
  }
};
</script>

  var direct = evs[ds] || [];

    if (startDate === ds) return;
    (evs[startDate] || []).forEach(function (ev) {
      if (ev.repeat === "monthly" && startDate.slice(8) === ds.slice(8) && startDate < ds)
        recurring.push(Object.assign({}, ev, { _src: startDate, _tag: "매월" }));
      else if (ev.repeat === "yearly" && startDate.slice(5) === ds.slice(5) && startDate < ds)
        recurring.push(Object.assign({}, ev, { _src: startDate, _tag: "매년" }));
      else if (ev.repeat === "range" && ev.rangeEnd && startDate < ds && ds <= ev.rangeEnd)
        recurring.push(Object.assign({}, ev, { _src: startDate, _tag: "기간" }));
    });
  });
  return direct.concat(recurring);
}
function hasEvOnDate(evs, ds) {
  if ((evs[ds] || []).length > 0) return true;
  return Object.keys(evs).some(function (startDate) {
    if (startDate === ds) return false;
    return (evs[startDate] || []).some(function (ev) {
      if (ev.repeat === "monthly") return startDate.slice(8) === ds.slice(8) && startDate < ds;
      if (ev.repeat === "yearly") return startDate.slice(5) === ds.slice(5) && startDate < ds;
      if (ev.repeat === "range" && ev.rangeEnd) return startDate < ds && ds <= ev.rangeEnd;
      return false;
    });
  });
}

          var parsed = JSON.parse(r.value);
          // deep merge financeData
          if (!parsed.financeData) parsed.financeData = DEF.financeData;

            if (!parsed.financeData.transactions) parsed.financeData.transactions = DEFAULT_TRANSACTIONS;
            if (!parsed.financeData.portfolio) parsed.financeData.portfolio = DEFAULT_PORTFOLIO;

/* ════════════════════════════════════════════════

function RoutineTab(props) {

        <div style={{ ...btwn, marginBottom: 10 }}>

/* ════════════════════════════════════════════════
   PROGRESS HABITS
   ════════════════════════════════════════════════ */
function ProgressHabits(props) {
  var d = props.d, save = props.save;
  var habits = d.progressHabits || [];
  var [adding, setAdding] = useState(false);
  var [form, setForm] = useState({ name: "", icon: "💪", type: "progressive", startCount: 1 });
  var ICONS = ["💪", "🏃", "📚", "✍️", "🧘", "💧", "🚭", "🍺", "🎯", "🌱", "😴", "🎵"];
  function setFormKey(k, v) { setForm(function (p) { return setKey(p, k, v); }); }
  function getTarget(hab) {
    var dates = hab.completedDates || [];
    if (hab.type === "progressive") { return (hab.startCount || 1) + dates.filter(function (dd) { return dd !== TODAY; }).length; }
    var yest = new Date(); yest.setDate(yest.getDate() - 1);
    var yStr = yest.toISOString().split("T")[0], s = new Set(dates);
    if (!s.has(yStr)) return 1;
    var cnt = 0, dd2 = new Date(yStr + "T00:00:00");
    for (var i = 0; i < 365; i++) { var k2 = dd2.toISOString().split("T")[0]; if (s.has(k2)) { cnt++; dd2.setDate(dd2.getDate() - 1); } else break; }
    return cnt + 1;
  }
  function getMissedMsg(hab) {
    if (hab.type !== "reset") return null;
    var dates = hab.completedDates || [];
    if (!dates.length) return null;
    var yest = new Date(); yest.setDate(yest.getDate() - 1);
    if (!dates.includes(yest.toISOString().split("T")[0])) return "어제 놓쳐서 초기화됐어요. 오늘부터 다시!";
    return null;
  }
  function toggle(hab) {
    var dates = hab.completedDates || [], done = dates.includes(TODAY);
    var next = done ? dates.filter(function (dd) { return dd !== TODAY; }) : dates.concat([TODAY]);
    save({ progressHabits: habits.map(function (h) { return h.id === hab.id ? Object.assign({}, h, { completedDates: next }) : h; }) });
  }
  function add() {
    if (!form.name.trim()) return;
    save({ progressHabits: habits.concat([Object.assign({ id: uid(), completedDates: [] }, form)]) });
    setForm({ name: "", icon: "💪", type: "progressive", startCount: 1 }); setAdding(false);
  }
  function del(id) { save({ progressHabits: habits.filter(function (h) { return h.id !== id; }) }); }

  return (
    <div>
      <div style={{ ...btwn, marginBottom: 8, marginTop: 4 }}><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>📈 증가 루틴</div><button onClick={function () { setAdding(!adding); }} style={{ fontSize: 11, color: C.purple, background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>+ 추가</button></div>
      {adding && <div style={{ ...card, border: "2px solid " + C.purple }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>{ICONS.map(function (ic) { return <button key={ic} onClick={function () { setFormKey("icon", ic); }} style={{ fontSize: 20, width: 36, height: 36, border: "2px solid " + (form.icon === ic ? C.purple : "transparent"), borderRadius: 9, background: form.icon === ic ? C.purpleL : "none", cursor: "pointer" }}>{ic}</button>; })}</div>
        <input placeholder="이름 (예: 푸쉬업, 금주)" value={form.name} onChange={function (e) { setFormKey("name", e.target.value); }} style={{ ...inp, marginBottom: 10 }} autoFocus />
        <div style={{ fontSize: 12, color: C.textMid, marginBottom: 8 }}>유형 선택</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
          <button onClick={function () { setFormKey("type", "progressive"); }} style={{ padding: "10px 8px", borderRadius: 10, border: "1.5px solid " + (form.type === "progressive" ? C.purple : C.border), background: form.type === "progressive" ? C.purpleL : "white", cursor: "pointer", textAlign: "left" }}><div style={{ fontSize: 13, fontWeight: 700, color: form.type === "progressive" ? C.purple : C.text, marginBottom: 2 }}>📈 점진형</div><div style={{ fontSize: 10, color: C.textLight, lineHeight: 1.4 }}>못한 날 멈춤, 이어서 증가</div></button>

function FinAssets(props) {
  var fd = props.fd, saveFin = props.saveFin;
  var [showForm, setShowForm] = useState(false);
  var [typeFilter, setTypeFilter] = useState("전체");
  var [form, setForm] = useState({ type: "부동산", name: "", purchasePrice: "", currentValue: "", date: TODAY, memo: "", loan: "" });
  function sf(k, v) { setForm(function (p) { return setKey(p, k, v); }); }

  var stockVal = fd.portfolio.reduce(function (s, p) { return s + p.qty * p.currentPrice; }, 0);
  var byType = {};
  ASSET_TYPES.forEach(function (t) { byType[t.key] = { total: 0, loan: 0 }; });
  fd.assets.forEach(function (a) { if (byType[a.type]) { byType[a.type].total += a.currentValue; byType[a.type].loan += a.loan; } });
  var totalAV = Object.values(byType).reduce(function (s, v) { return s + v.total; }, 0) + stockVal;
  var totalLoan = Object.values(byType).reduce(function (s, v) { return s + v.loan; }, 0);

  function addAsset() {
    if (!form.name || !form.currentValue) return;
    saveFin({ assets: fd.assets.concat([{ id: uid(), type: form.type, name: form.name, purchasePrice: Number(form.purchasePrice) || 0, currentValue: Number(form.currentValue), date: form.date, memo: form.memo, loan: Number(form.loan) || 0 }]) });
    setForm({ type: "부동산", name: "", purchasePrice: "", currentValue: "", date: TODAY, memo: "", loan: "" }); setShowForm(false);
  }
  function delAsset(id) { saveFin({ assets: fd.assets.filter(function (a) { return a.id !== id; }) }); }

  var filtered = typeFilter === "전체" ? fd.assets : fd.assets.filter(function (a) { return a.type === typeFilter; });

  // donut
  var donutData = ASSET_TYPES.map(function (t) { return { label: t.key, icon: t.icon, color: t.color, value: byType[t.key].total }; });
  if (stockVal > 0) donutData.push({ label: "주식", icon: "📈", color: C.green, value: stockVal });
  var donutTotal = donutData.reduce(function (s, dd) { return s + dd.value; }, 0);
  var donutFiltered = donutData.filter(function (dd) { return dd.value > 0; });
  var cumAngle = 0;
  var arcs = donutFiltered.map(function (dd) {
    var pct = donutTotal > 0 ? dd.value / donutTotal : 0;
    var start = cumAngle, end = cumAngle + pct * 360; cumAngle = end;
    var r = 55, cx = 65, cy = 65;

    var x2 = cx + r * Math.cos(e1), y2 = cy + r * Math.sin(e1);
    var large = pct > 0.5 ? 1 : 0;
    var path = pct >= 0.999 ? "M " + cx + "," + (cy - r) + " A " + r + "," + r + " 0 1,1 " + (cx - 0.01) + "," + (cy - r) + " A " + r + "," + r + " 0 1,1 " + cx + "," + (cy - r) : "M " + cx + "," + cy + " L " + x1 + "," + y1 + " A " + r + "," + r + " 0 " + large + ",1 " + x2 + "," + y2 + " Z";
    return Object.assign({}, dd, { path: path, pct: pct });
  });

          <svg width="130" height="130" viewBox="0 0 130 130"><g>{arcs.map(function (a, i) { return <path key={i} d={a.path} fill={a.color} opacity="0.85" stroke="white" strokeWidth="1.5" />; })}</g><circle cx="65" cy="65" r="32" fill="white" /><text x="65" y="62" textAnchor="middle" fill={C.text} fontSize="9" fontWeight="600">총자산</text><text x="65" y="76" textAnchor="middle" fill={C.blue} fontSize="11" fontWeight="700">{formatMoney(totalAV)}</text></svg>

function FinStocks(props) {

  var [addForm, setAddForm] = useState({ code: "005930", qty: "", avgPrice: "" });

  var sectors = ["전체"].concat(Array.from(new Set(STOCK_DATA.map(function (s) { return s.sector; }))));
  var filtered = sectorFilter === "전체" ? STOCK_DATA : STOCK_DATA.filter(function (s) { return s.sector === sectorFilter; });
  var sorted = filtered.slice().sort(function (a, b) {
    if (sortBy === "upside") return ((b.fair - b.price) / b.price) - ((a.fair - a.price) / a.price);
    if (sortBy === "per") return (a.per || 999) - (b.per || 999);
    if (sortBy === "pbr") return a.pbr - b.pbr;
    if (sortBy === "div") return b.div - a.div;
    if (sortBy === "roe") return b.roe - a.roe;
    return 0;
  });

  var totalVal = fd.portfolio.reduce(function (s, p) { return s + p.qty * p.currentPrice; }, 0);
  var totalCost = fd.portfolio.reduce(function (s, p) { return s + p.qty * p.avgPrice; }, 0);
  var totalRet = totalVal - totalCost;

  function addStock() {
    var stock = STOCK_DATA.find(function (s) { return s.code === addForm.code; });
    if (!stock || !addForm.qty || !addForm.avgPrice) return;
    saveFin({ portfolio: fd.portfolio.concat([{ id: uid(), code: stock.code, name: stock.name, qty: Number(addForm.qty), avgPrice: Number(addForm.avgPrice), currentPrice: stock.price }]) });
    setAddForm({ code: "005930", qty: "", avgPrice: "" }); setShowAdd(false);
  }
  function delStock(id) { saveFin({ portfolio: fd.portfolio.filter(function (p) { return p.id !== id; }) }); }

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
        <div style={{ ...card, marginBottom: 0, borderLeft: "4px solid " + C.blue }}><div style={{ fontSize: 10, color: C.textLight }}>평가금액</div><div style={{ fontSize: 15, fontWeight: 700, color: C.blue }}>{formatMoney(totalVal)}</div></div>
        <div style={{ ...card, marginBottom: 0, borderLeft: "4px solid " + C.textMid }}><div style={{ fontSize: 10, color: C.textLight }}>투자금</div><div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{formatMoney(totalCost)}</div></div>
        <div style={{ ...card, marginBottom: 0, borderLeft: "4px solid " + (totalRet >= 0 ? C.green : C.red) }}><div style={{ fontSize: 10, color: C.textLight }}>수익</div><div style={{ fontSize: 15, fontWeight: 700, color: totalRet >= 0 ? C.green : C.red }}>{totalRet >= 0 ? "+" : ""}{formatMoney(totalRet)}</div></div>
      </div>

      <div style={{ ...btwn, marginBottom: 8 }}><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>💼 포트폴리오</div><button onClick={function () { setShowAdd(!showAdd); }} style={btnP}>{showAdd ? "취소" : "+ 추가"}</button></div>
      {showAdd && <div style={{ ...card, border: "2px solid " + C.green }}>
        <select value={addForm.code} onChange={function (e) { setAddForm(function (f) { return setKey(f, "code", e.target.value); }); }} style={{ ...inp, marginBottom: 8 }}>{STOCK_DATA.map(function (s) { return <option key={s.code} value={s.code}>{s.name} ({s.code})</option>; })}</select>
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}><input type="number" placeholder="수량" value={addForm.qty} onChange={function (e) { setAddForm(function (f) { return setKey(f, "qty", e.target.value); }); }} style={{ ...inp, flex: 1 }} /><input type="number" placeholder="평균매입가" value={addForm.avgPrice} onChange={function (e) { setAddForm(function (f) { return setKey(f, "avgPrice", e.target.value); }); }} style={{ ...inp, flex: 1 }} /></div>
        <button onClick={addStock} style={{ ...btnP, width: "100%" }}>추가</button>
      </div>}
      {fd.portfolio.map(function (p) {
        var ret = ((p.currentPrice - p.avgPrice) / p.avgPrice) * 100;
        return <div key={p.id} style={{ ...card, borderLeft: "4px solid " + (ret >= 0 ? C.green : C.red), padding: "10px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 700 }}>{p.name} <span style={{ fontSize: 10, color: C.textLight }}>{p.code}</span></div><div style={{ fontSize: 11, color: C.textMid }}>{p.qty}주 · 평단 {p.avgPrice.toLocaleString()}</div></div>
            <div style={{ textAlign: "right" }}><div style={{ fontSize: 14, fontWeight: 700 }}>{(p.qty * p.currentPrice).toLocaleString()}</div><div style={{ fontSize: 12, fontWeight: 700, color: ret >= 0 ? C.green : C.red }}>{ret >= 0 ? "+" : ""}{ret.toFixed(1)}%</div></div>
            <button onClick={function () { delStock(p.id); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.textLight, fontSize: 18 }}>×</button>
          </div>
        </div>;
      })}

      <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 8, marginTop: 6 }}>🔎 저평가 종목 스크리너</div>
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 8 }}>
        {sectors.map(function (s) { return <button key={s} onClick={function () { setSectorFilter(s); }} style={{ padding: "4px 10px", borderRadius: 20, border: "1.5px solid " + (sectorFilter === s ? C.purple : C.border), background: sectorFilter === s ? C.purpleL : "white", color: sectorFilter === s ? C.purple : C.textMid, cursor: "pointer", fontSize: 10, fontWeight: 600 }}>{s}</button>; })}
      </div>
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 10 }}>
        {[["upside", "상승여력"], ["per", "PER↓"], ["pbr", "PBR↓"], ["div", "배당↑"], ["roe", "ROE↑"]].map(function (s) { return <button key={s[0]} onClick={function () { setSortBy(s[0]); }} style={{ padding: "4px 10px", borderRadius: 20, border: "1.5px solid " + (sortBy === s[0] ? C.blue : C.border), background: sortBy === s[0] ? "#eff6ff" : "white", color: sortBy === s[0] ? C.blue : C.textMid, cursor: "pointer", fontSize: 10, fontWeight: 600 }}>{s[1]}</button>; })}
      </div>
      {sorted.map(function (s) {
        var upside = ((s.fair - s.price) / s.price) * 100;
        var isUnder = upside > 25;
        return <div key={s.code} style={{ ...card, borderLeft: "4px solid " + (isUnder ? C.green : C.border), padding: "10px 14px" }}>
          <div style={{ ...btwn, marginBottom: 4 }}>
            <div><span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{s.name}</span>{isUnder && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: "#ecfdf5", color: C.green, marginLeft: 6 }}>저평가</span>}</div>
            <div style={{ fontSize: 10, color: C.textLight }}>{s.sector}</div>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <span style={{ fontSize: 11, color: C.textMid }}>현재 <b style={{ color: C.text }}>{s.price.toLocaleString()}</b></span>
            <span style={{ fontSize: 11, color: C.textMid }}>적정 <b style={{ color: C.blue }}>{s.fair.toLocaleString()}</b></span>
            <span style={{ fontSize: 11, fontWeight: 700, color: upside > 25 ? C.green : upside > 10 ? C.orange : C.textMid }}>+{upside.toFixed(0)}%↑</span>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 4, flexWrap: "wrap" }}>
            <span style={{ fontSize: 10, color: s.per && s.per < 10 ? C.green : C.textLight }}>PER {s.per || "N/A"}</span>
            <span style={{ fontSize: 10, color: s.pbr < 0.7 ? C.green : C.textLight }}>PBR {s.pbr}</span>

            <span style={{ fontSize: 10, color: s.div > 3 ? C.blue : C.textLight }}>배당 {s.div}%</span>
            <span style={{ fontSize: 10, fontWeight: 600, color: s.change >= 0 ? C.green : C.red }}>{s.change >= 0 ? "+" : ""}{s.change}%</span>
          </div>
        </div>;
      })}
      <div style={{ ...card, background: C.grayXL, padding: 12 }}>
        <div style={{ fontSize: 11, color: C.textMid, lineHeight: 1.7 }}>💡 <b>저평가 기준:</b> PBR 0.7 미만, PER 10 미만, 상승여력 25% 이상. 실제 투자 시 재무제표·산업 전망을 종합 분석하세요.<br />※ 예시 데이터이며 실제 시세와 다릅니다.</div>
      </div>
    </div>
  );
}

function CalTab(props) {
  var d = props.d, save = props.save;
  var [yr, setYr] = useState(new Date().getFullYear());
  var [mo, setMo] = useState(new Date().getMonth());
  var [sel, setSel] = useState(TODAY);
  var [modal, setModal] = useState(false);
  var [editEv, setEditEv] = useState(null);
  var F0 = { title: "", time: "", color: "purple", memo: "", repeat: "none", rangeEnd: "" };
  var [form, setForm] = useState(F0);
  var evs = d.calEvents || {};
  var COLORS = { purple: C.purple, green: C.green, orange: C.orange, red: C.red, blue: C.blue };
  var MN = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];
  var RPTS = [["none", "반복 없음"], ["range", "기간 선택"], ["monthly", "매월 반복"], ["yearly", "매년 반복"]];
  var RBADGE = { monthly: "매월", yearly: "매년", range: "기간" };
  function setFormKey2(k, v) { setForm(function (p) { return setKey(p, k, v); }); }
  var firstDay = new Date(yr, mo, 1).getDay();
  var dim = new Date(yr, mo + 1, 0).getDate();
  var cells = [];
  for (var ci = 0; ci < firstDay; ci++) cells.push(null);
  for (var ci2 = 1; ci2 <= dim; ci2++) cells.push(ci2);
  while (cells.length % 7 !== 0) cells.push(null);
  function fmt(fy, fm, fd2) { return fy + "-" + String(fm + 1).padStart(2, "0") + "-" + String(fd2).padStart(2, "0"); }
  var selEvs = getEventsForDate(evs, sel);
  function openAdd() { setEditEv(null); setForm(F0); setModal(true); }
  function openEdit(ev) { setEditEv(ev); setForm({ title: ev.title, time: ev.time || "", color: ev.color || "purple", memo: ev.memo || "", repeat: ev.repeat || "none", rangeEnd: ev.rangeEnd || "" }); setModal(true); }
  function saveEv() {
    if (!form.title.trim()) return;
    var src = (editEv && editEv._src) ? editEv._src : sel;
    var de = evs[src] || [];
    var pay = Object.assign({}, form);
    if (form.repeat !== "range") delete pay.rangeEnd;
    var updated = editEv ? de.map(function (ev) { return ev.id === editEv.id ? Object.assign({}, ev, pay) : ev; }) : de.concat([Object.assign({ id: uid() }, pay)]);
    updated.sort(function (a, b) { return (a.time || "99:99").localeCompare(b.time || "99:99"); });
    var ne = Object.assign({}, evs); ne[src] = updated;
    save({ calEvents: ne }); setModal(false);
  }
  function delEv(ev) {
    var src = ev._src || sel;
    var ne = Object.assign({}, evs); ne[src] = (evs[src] || []).filter(function (e) { return e.id !== ev.id; });
    save({ calEvents: ne });
  }

  return (
    <div style={{ padding: 16 }}>
      <div style={{ ...btwn, marginBottom: 14 }}>
        <button onClick={function () { if (mo === 0) { setYr(function (y) { return y - 1; }); setMo(11); } else setMo(function (m) { return m - 1; }); }} style={{ ...btnG, padding: "8px 14px", fontSize: 16 }}>‹</button>
        <div style={{ fontSize: 20, fontWeight: 700, color: C.text }}>{yr}년 {MN[mo]}</div>
        <button onClick={function () { if (mo === 11) { setYr(function (y) { return y + 1; }); setMo(0); } else setMo(function (m) { return m + 1; }); }} style={{ ...btnG, padding: "8px 14px", fontSize: 16 }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 4 }}>
        {["일", "월", "화", "수", "목", "금", "토"].map(function (dn, di) { return <div key={dn} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, padding: "4px 0", color: di === 0 ? C.red : di === 6 ? C.blue : C.textMid }}>{dn}</div>; })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 14 }}>
        {cells.map(function (day, ci3) {
          if (!day) return <div key={"e" + ci3} />;
          var ds = fmt(yr, mo, day), dow = ci3 % 7;
          var isT = ds === TODAY, isSel = ds === sel, hol = getHol(ds);
          var isRed = dow === 0 || !!hol, isSat = dow === 6, hEv = hasEvOnDate(evs, ds);
          return <div key={day} onClick={function () { setSel(ds); }} style={{ minHeight: 52, borderRadius: 10, padding: "4px 3px", cursor: "pointer", background: isSel ? "#eef2ff" : isT ? "#f0fdf4" : "white", border: "1px solid " + (isSel ? C.purple : isT ? C.green : C.border), display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <div style={{ width: 24, height: 24, borderRadius: "50%", background: isT ? C.green : isSel ? C.purple : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontSize: 13, fontWeight: 700, color: isT || isSel ? "white" : isRed ? C.red : isSat ? C.blue : C.text }}>{day}</span></div>
            {hol && <div style={{ fontSize: 8, color: C.red, textAlign: "center", lineHeight: 1.1, padding: "0 1px", overflow: "hidden" }}>{hol.length > 5 ? hol.slice(0, 4) + "…" : hol}</div>}
            {hEv && <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.purple }} />}
          </div>;
        })}
      </div>
      <div style={{ ...btwn, marginBottom: 8 }}><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{fmtDate(sel)}{getHol(sel) && <span style={{ fontSize: 11, color: C.red, marginLeft: 6, fontWeight: 400 }}>{getHol(sel)}</span>}</div><button onClick={openAdd} style={btnP}>+ 일정 추가</button></div>
      {selEvs.length === 0 && <div style={{ ...card, textAlign: "center", padding: 24, color: C.textLight, fontSize: 13 }}>일정이 없어요</div>}
      {selEvs.map(function (ev, ei) {
        var col = COLORS[ev.color] || C.purple;

  function sf(k, v) { setForm(function (p) { return setKey(p, k, v); }); }

  function handlePhotos(e) {

    files.forEach(function (file) { var reader = new FileReader(); reader.onload = function (ev) { newP.push({ id: uid(), data: ev.target.result }); loaded++; if (loaded === files.length) sf("photos", cur.concat(newP)); }; reader.readAsDataURL(file); });
  }
  function add() { if (!form.name.trim()) return; saveR({ races: (rd.races || []).concat([Object.assign({ id: uid() }, form)]) }); setForm(FORM0); setAdding(false); }
  function del(rid) { saveR({ races: (rd.races || []).filter(function (rc) { return rc.id !== rid; }) }); }
  function delPhoto(raceId, pid) { saveR({ races: (rd.races || []).map(function (rc) { if (rc.id !== raceId) return rc; return Object.assign({}, rc, { photos: (rc.photos || []).filter(function (p) { return p.id !== pid; }) }); }) }); }

  return (

        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}><div style={{ flex: 1 }}><div style={{ fontSize: 11, color: C.textMid, marginBottom: 4 }}>거리 (km)</div><input type="number" step="0.1" value={form.distance} onChange={function (e) { sf("distance", e.target.value); }} style={inp} /></div><div style={{ flex: 1 }}><div style={{ fontSize: 11, color: C.textMid, marginBottom: 4 }}>완주 시간</div><input placeholder="4:32:10" value={form.finishTime} onChange={function (e) { sf("finishTime", e.target.value); }} style={inp} /></div></div>
        <input placeholder="순위 (선택)" value={form.position} onChange={function (e) { sf("position", e.target.value); }} style={{ ...inp, marginBottom: 8 }} />
        <textarea placeholder="레이스 후기..." value={form.note} onChange={function (e) { sf("note", e.target.value); }} style={{ ...inp, height: 70, resize: "vertical", marginBottom: 10 }} />
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 6 }}>📸 사진 (최대 5장)</div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", border: "1.5px dashed " + C.border, borderRadius: 10, cursor: "pointer", marginBottom: 10, color: C.textMid, fontSize: 12 }}><span style={{ fontSize: 20 }}>📷</span><span>사진 선택하기</span><input type="file" accept="image/*" multiple onChange={handlePhotos} style={{ display: "none" }} /></label>
        {(form.photos || []).length > 0 && <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>{(form.photos || []).map(function (p) { return <div key={p.id} style={{ position: "relative", width: 72, height: 72 }}><img src={p.data} alt="" style={{ width: 72, height: 72, objectFit: "cover", borderRadius: 10, border: "1px solid " + C.border }} /><button onClick={function () { sf("photos", (form.photos || []).filter(function (x) { return x.id !== p.id; })); }} style={{ position: "absolute", top: -6, right: -6, width: 18, height: 18, borderRadius: "50%", background: C.red, color: "white", border: "none", cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>×</button></div>; })}</div>}
        <div style={row}><button onClick={add} style={{ ...btnP, flex: 1 }}>저장</button><button onClick={function () { setAdding(false); setForm(FORM0); }} style={btnG}>취소</button></div>
      </div>}
      {raceList.length === 0 && !adding && <Empty icon="🏅" text="첫 대회 기록을 남겨보세요" />}
      {raceList.slice().sort(function (a, b) { return b.date.localeCompare(a.date); }).map(function (rc) {

function NatureTab(props) {
  var d = props.d, save = props.save;
  var [sub, setSub] = useState("log");
  var nd = d.natureData || DEFAULT_NATURE;
  function saveN(u) { save({ natureData: Object.assign({}, nd, u) }); }

  var totalLogs = nd.herbLogs.length;
  var totalCult = nd.cultivation.length;
  var totalStudy = nd.studyNotes.length;
  var uniqueHerbs = [];
  nd.herbLogs.forEach(function (l) { (l.herbs || []).forEach(function (h) { if (uniqueHerbs.indexOf(h.name) === -1) uniqueHerbs.push(h.name); }); });

  // runner connection
  var rd = d.runnerData || { logs: [], stage: "5k" };
  var trailRuns = rd.logs.filter(function (l) { return l.type === "트레일런" || l.type === "파워하이킹"; });

  // seasonal herbs
  var curM = new Date().getMonth() + 1;
  var seasonLabel = curM >= 3 && curM <= 5 ? "봄" : curM >= 6 && curM <= 8 ? "여름" : curM >= 9 && curM <= 11 ? "가을" : "겨울";
  var seasonHerbs = HERBS_DB.filter(function (h) {
    var s = h.season;
    if (seasonLabel === "봄" && (s.includes("봄") || s.includes("4") || s.includes("5") || s.includes("3"))) return true;
    if (seasonLabel === "여름" && (s.includes("여름") || s.includes("6") || s.includes("7") || s.includes("8"))) return true;
    if (seasonLabel === "가을" && (s.includes("가을") || s.includes("9") || s.includes("10") || s.includes("11"))) return true;
    if (seasonLabel === "겨울" && (s.includes("겨울") || s.includes("11") || s.includes("12") || s.includes("1") || s.includes("2") || s.includes("3"))) return true;
    return false;
  });

  // routine connection
  var todayChecks = (d.routineChecks && d.routineChecks[TODAY]) || {};
  var herbRoutineDone = ["w15", "e11"].filter(function (rid) { return todayChecks[rid]; }).length;

  var SUBS = [["log", "🏔️ 산행"], ["guide", "📖 도감"], ["grow", "🌱 재배"], ["study", "📝 공부"]];

  return (
    <div style={{ padding: 16 }}>
      <div style={{ ...card, background: "linear-gradient(135deg,#14532d,#15803d)", color: "white", border: "none" }}>
        <div style={{ fontSize: 11, opacity: 0.6, marginBottom: 2 }}>심마니의 꿈</div>
        <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>🌿 산약초 생활</div>
        <div style={{ fontSize: 11, opacity: 0.7, marginBottom: 12 }}>산에서 나는 것들을 알고, 캐고, 기르는 삶</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
          {[{ ic: "🏔️", val: totalLogs, lbl: "산행" }, { ic: "🌿", val: uniqueHerbs.length, lbl: "채집종" }, { ic: "🌱", val: totalCult, lbl: "재배" }, { ic: "🏃", val: trailRuns.length, lbl: "트레일런" }].map(function (st) {
            return <div key={st.lbl} style={{ background: "rgba(255,255,255,0.12)", borderRadius: 8, padding: "6px" }}>
              <div style={{ fontSize: 9, opacity: 0.6, marginBottom: 1 }}>{st.lbl}</div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{st.ic} {st.val}</div>
            </div>;
          })}
        </div>
      </div>

      {/* 계절 약초 추천 */}
      <div style={{ ...card, background: "#f0fdf4", border: "1px solid #bbf7d0" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#065f46", marginBottom: 6 }}>🗓️ 지금은 {seasonLabel} — 채취 가능한 약초</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {seasonHerbs.map(function (h) {
            return <span key={h.name} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: "white", border: "1px solid #bbf7d0", color: "#065f46", fontWeight: 600 }}>{h.icon} {h.name}</span>;
          })}
          {seasonHerbs.length === 0 && <span style={{ fontSize: 11, color: "#065f46" }}>이 계절에는 뿌리류 위주로 채취합니다</span>}
        </div>
      </div>

      {/* 루틴 연결 */}
      <div style={{ ...card, padding: "10px 14px" }}>
        <div style={{ ...btwn }}>
          <div style={{ fontSize: 12, color: C.textMid }}>📋 오늘 약초 루틴</div>
          <div style={{ fontSize: 12, fontWeight: 700, color: herbRoutineDone > 0 ? "#15803d" : C.textLight }}>{herbRoutineDone > 0 ? "✓ 완료" : "미완료"}</div>
        </div>
      </div>

      {trailRuns.length > 0 && <div style={{ ...card, borderLeft: "4px solid #10b981", background: "#f0fdf4", padding: "10px 14px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#065f46", marginBottom: 4 }}>🏃↔️🌿 러너 연결</div>
        <div style={{ fontSize: 12, color: "#064e3b" }}>트레일런 {trailRuns.length}회 — 산을 달리며 약초를 만나다</div>
        {trailRuns.slice(-2).map(function (tr) { return <div key={tr.id} style={{ fontSize: 11, color: "#065f46", marginTop: 4 }}>🏃 {fmtDate(tr.date)} · {tr.km || "?"}km {tr.note ? "· " + tr.note.slice(0, 20) : ""}</div>; })}
      </div>}

      <div style={{ display: "flex", gap: 4, marginBottom: 12, overflowX: "auto", paddingBottom: 2 }}>
        {SUBS.map(function (sb) { return <button key={sb[0]} onClick={function () { setSub(sb[0]); }} style={{ ...sb[0] === sub ? btnP : btnG, whiteSpace: "nowrap", fontSize: 11, padding: "7px 10px", flexShrink: 0, background: sb[0] === sub ? "#15803d" : undefined, color: sb[0] === sub ? "white" : undefined }}>{sb[1]}</button>; })}
      </div>

      {sub === "log" && <HerbLogSub nd={nd} saveN={saveN} />}
      {sub === "guide" && <HerbGuideSub />}
      {sub === "grow" && <HerbGrowSub nd={nd} saveN={saveN} />}
      {sub === "study" && <HerbStudySub nd={nd} saveN={saveN} />}
    </div>
  );
}

function HerbLogSub(props) {
  var nd = props.nd, saveN = props.saveN;
  var [adding, setAdding] = useState(false);
  var [form, setForm] = useState({ date: TODAY, mountain: "", herbs: [], note: "" });
  var [herbName, setHerbName] = useState("");
  var [herbQty, setHerbQty] = useState("");
  function sf(k, v) { setForm(function (p) { return setKey(p, k, v); }); }

  function addHerbToForm() {
    if (!herbName.trim()) return;
    sf("herbs", form.herbs.concat([{ name: herbName.trim(), qty: herbQty.trim() || "소량" }]));
    setHerbName(""); setHerbQty("");
  }
  function removeHerbFromForm(i) { sf("herbs", form.herbs.filter(function (_, idx) { return idx !== i; })); }

  function addLog() {
    if (!form.mountain.trim()) return;
    saveN({ herbLogs: nd.herbLogs.concat([Object.assign({ id: uid(), photos: [] }, form)]) });
    setForm({ date: TODAY, mountain: "", herbs: [], note: "" }); setAdding(false);
  }
  function delLog(lid) { saveN({ herbLogs: nd.herbLogs.filter(function (l) { return l.id !== lid; }) }); }

    <div>
      <div style={{ ...btwn, marginBottom: 10 }}><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>🏔️ 약초산행 기록</div><button onClick={function () { setAdding(!adding); }} style={{ ...btnP, background: "#15803d" }}>+ 산행</button></div>
      {adding && <div style={{ ...card, border: "2px solid #15803d" }}>
        <input type="date" value={form.date} onChange={function (e) { sf("date", e.target.value); }} style={{ ...inp, marginBottom: 8 }} />
        <input placeholder="산 이름 * (예: 지리산, 가야산)" value={form.mountain} onChange={function (e) { sf("mountain", e.target.value); }} style={{ ...inp, marginBottom: 10 }} autoFocus />
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 6 }}>채집한 약초</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          <input placeholder="약초명" value={herbName} onChange={function (e) { setHerbName(e.target.value); }} style={{ ...inp, flex: 2 }} />
          <input placeholder="수량" value={herbQty} onChange={function (e) { setHerbQty(e.target.value); }} style={{ ...inp, flex: 1 }} />
          <button onClick={addHerbToForm} style={{ ...btnP, background: "#15803d", flexShrink: 0, padding: "8px 12px" }}>+</button>
        </div>
        {form.herbs.length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
          {form.herbs.map(function (h, i) {
            return <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 20, background: "#ecfdf5", color: "#065f46", fontSize: 12, fontWeight: 600 }}>
              🌿 {h.name} ({h.qty})
              <button onClick={function () { removeHerbFromForm(i); }} style={{ border: "none", background: "none", cursor: "pointer", color: "#065f46", fontSize: 14, padding: 0 }}>×</button>
            </span>;
          })}
        </div>}
        <textarea placeholder="산행 메모..." value={form.note} onChange={function (e) { sf("note", e.target.value); }} style={{ ...inp, height: 70, resize: "vertical", marginBottom: 8 }} />
        <div style={row}><button onClick={addLog} style={{ ...btnP, flex: 1, background: "#15803d" }}>저장</button><button onClick={function () { setAdding(false); }} style={btnG}>취소</button></div>
      </div>}
      {sorted.length === 0 && !adding && <Empty icon="🏔️" text="첫 약초산행을 기록해보세요" />}
      {sorted.map(function (log) {

            <div style={{ flex: 1 }}>

              {(log.herbs || []).length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
                {log.herbs.map(function (h, i) { return <span key={i} style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 10, background: "#ecfdf5", color: "#065f46" }}>🌿 {h.name} {h.qty}</span>; })}

        </div>;
      })}

function HerbGuideSub() {
  var [search, setSearch] = useState("");
  var [sel, setSel] = useState(null);
  var [seasonF, setSeasonF] = useState("전체");
  var SEASONS = ["전체", "봄", "여름", "가을", "겨울"];
  var filtered = HERBS_DB.filter(function (h) {
    if (search.trim() && !h.name.includes(search) && !h.use.includes(search)) return false;
    if (seasonF !== "전체") {
      var s = h.season;
      if (seasonF === "봄" && !(s.includes("봄") || s.includes("4") || s.includes("5") || s.includes("3"))) return false;
      if (seasonF === "여름" && !(s.includes("여름") || s.includes("6") || s.includes("7") || s.includes("8"))) return false;
      if (seasonF === "가을" && !(s.includes("가을") || s.includes("9") || s.includes("10") || s.includes("11"))) return false;
      if (seasonF === "겨울" && !(s.includes("겨울") || s.includes("11") || s.includes("12") || s.includes("1") || s.includes("2") || s.includes("3"))) return false;
    }
    return true;
  });

  return (
    <div>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 8 }}>📖 산약초 도감 <span style={{ fontSize: 11, fontWeight: 400, color: C.textLight }}>{HERBS_DB.length}종</span></div>
      <input value={search} onChange={function (e) { setSearch(e.target.value); }} placeholder="약초 이름 또는 효능 검색..." style={{ ...inp, marginBottom: 8 }} />
      <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
        {SEASONS.map(function (s) { return <button key={s} onClick={function () { setSeasonF(s); }} style={{ padding: "4px 10px", borderRadius: 20, border: "1.5px solid " + (seasonF === s ? "#15803d" : C.border), background: seasonF === s ? "#ecfdf5" : "white", color: seasonF === s ? "#15803d" : C.textMid, cursor: "pointer", fontSize: 11, fontWeight: 600 }}>{s}</button>; })}
      </div>
      {sel && (function () {
        var h = sel;
        return <div style={{ ...card, border: "2px solid #15803d", marginBottom: 10 }}>
          <div style={{ ...btwn, marginBottom: 8 }}><div style={{ fontSize: 18, fontWeight: 700, color: "#15803d" }}>{h.icon} {h.name}</div><button onClick={function () { setSel(null); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.textLight, fontSize: 18 }}>×</button></div>
          <div style={{ fontSize: 11, color: C.textMid, fontStyle: "italic", marginBottom: 8 }}>{h.sci}</div>
          {[["채취 시기", h.season], ["서식지", h.spot], ["효능", h.use], ["난이도", h.diff]].map(function (pair) {
            return <div key={pair[0]} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
              <span style={{ fontSize: 11, color: C.textLight, minWidth: 60 }}>{pair[0]}</span>
              <span style={{ fontSize: 12, color: C.text, fontWeight: 500 }}>{pair[1]}</span>
            </div>;
          })}
        </div>;
      })()}

/* ─── AREA DETECTION ─── */
var AREA_KEYWORDS = {
  runner: ["걷기", "조깅", "달리기", "등산", "러닝", "하이킹", "스트레칭"],
  writer: ["다이어리", "독서", "글쓰기", "블로그", "공부", "읽기", "쓰기"],
  finance: ["재테크", "투자", "가계부", "절약", "저축"],
  nature: ["약초", "산행", "산약초", "재배", "텃밭", "심마니", "임업", "농업", "식물", "채집"],
};
var AREA_META = {
  runner: { icon: "🏃", label: "러너", color: "#10b981", gradient: "linear-gradient(135deg,#064e3b,#10b981)" },
  writer: { icon: "✒️", label: "작가", color: "#6366f1", gradient: "linear-gradient(135deg,#1e1b4b,#4338ca)" },
  finance: { icon: "💰", label: "경제", color: "#0284c7", gradient: "linear-gradient(135deg,#0c4a6e,#0284c7)" },
  nature: { icon: "🌿", label: "산약초", color: "#15803d", gradient: "linear-gradient(135deg,#14532d,#15803d)" },
  life: { icon: "🌱", label: "생활", color: "#f97316", gradient: "linear-gradient(135deg,#7c2d12,#f97316)" },
};
function detectArea(text) {
  var t = text.toLowerCase();
  if (AREA_KEYWORDS.nature.some(function (k) { return t.includes(k); })) return "nature";
  if (AREA_KEYWORDS.runner.some(function (k) { return t.includes(k); })) return "runner";
  if (AREA_KEYWORDS.writer.some(function (k) { return t.includes(k); })) return "writer";
  if (AREA_KEYWORDS.finance.some(function (k) { return t.includes(k); })) return "finance";
  return "life";
}

function DashboardTab(props) {

  /* ── 루틴 데이터 계산 ── */
  var isWknd = [0, 6].includes(new Date().getDay());
  var baseR = isWknd ? WEEKEND_ROUTINE : WEEKDAY_ROUTINE;
  var extraR = isWknd ? (d.extraWeekend || []) : (d.extraWeekday || []);
  var allRoutine = baseR.concat(extraR);
  var todayChecks = (d.routineChecks && d.routineChecks[TODAY]) || {};
  var todayDone = allRoutine.filter(function (r) { return todayChecks[r.id]; }).length;
  var todayPct = allRoutine.length > 0 ? Math.round(todayDone / allRoutine.length * 100) : 0;

  // 7일 루틴 달성률
  var weekStats = WEEK_DAYS.map(function (ds) {
    var dayIsWknd = [0, 6].includes(new Date(ds + "T00:00:00").getDay());
    var dayBase = dayIsWknd ? WEEKEND_ROUTINE : WEEKDAY_ROUTINE;
    var dayExtra = dayIsWknd ? (d.extraWeekend || []) : (d.extraWeekday || []);
    var dayAll = dayBase.concat(dayExtra);
    var dayChecks = (d.routineChecks && d.routineChecks[ds]) || {};
    var dayDone = dayAll.filter(function (r) { return dayChecks[r.id]; }).length;
    return { date: ds, total: dayAll.length, done: dayDone, pct: dayAll.length > 0 ? Math.round(dayDone / dayAll.length * 100) : 0 };
  });
  var weekAvgPct = weekStats.length > 0 ? Math.round(weekStats.reduce(function (s, w) { return s + w.pct; }, 0) / weekStats.length) : 0;

  // 영역별 루틴 분류
  var areaRoutineCounts = { runner: { total: 0, done: 0 }, writer: { total: 0, done: 0 }, finance: { total: 0, done: 0 }, nature: { total: 0, done: 0 }, life: { total: 0, done: 0 } };
  allRoutine.forEach(function (r) {
    var area = detectArea(r.text);
    areaRoutineCounts[area].total++;
    if (todayChecks[r.id]) areaRoutineCounts[area].done++;
  });

          <svg width="80" height="80" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="6" />
            <circle cx="40" cy="40" r="36" fill="none" stroke={todayPct >= 80 ? "#34d399" : todayPct >= 50 ? "#fbbf24" : "rgba(255,255,255,0.6)"} strokeWidth="6" strokeLinecap="round" strokeDasharray={(circ * todayPct / 100) + " " + (circ * (1 - todayPct / 100))} />
            <text x="40" y="44" textAnchor="middle" fill="white" fontSize="18" fontWeight="700" style={{ transform: "rotate(90deg)", transformOrigin: "40px 40px" }}>{todayPct}%</text>
          </svg>
        </div>
        {/* 7일 미니차트 */}
        <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 32 }}>
          {weekStats.map(function (ws) {
            var isToday = ws.date === TODAY;
            var h = Math.max(4, ws.pct * 0.28);
            var dayLabel = ["일", "월", "화", "수", "목", "금", "토"][new Date(ws.date + "T00:00:00").getDay()];
            return <div key={ws.date} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <div style={{ width: "100%", height: h, borderRadius: 3, background: isToday ? "white" : ws.pct >= 80 ? "rgba(52,211,153,0.7)" : ws.pct > 0 ? "rgba(255,255,255,0.35)" : "rgba(255,255,255,0.1)" }} />
              <div style={{ fontSize: 8, opacity: isToday ? 1 : 0.5, fontWeight: isToday ? 700 : 400 }}>{dayLabel}</div>
            </div>;
          })}
        </div>
      </div>

      {/* ═══ 2. 루틴 → 영역 연결 ═══ */}
      <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 8, marginTop: 4 }}>루틴이 만드는 성장</div>
      <div style={{ fontSize: 11, color: C.textLight, marginBottom: 10 }}>매일의 작은 행동이 각 영역으로 확장됩니다</div>

      {/* 러너 연결 */}
      {(function () {
        var ac = areaRoutineCounts.runner;
        var acPct = ac.total > 0 ? Math.round(ac.done / ac.total * 100) : 0;
        var conn = connectionLevel(acPct);
        return <div style={{ ...card, borderLeft: "4px solid " + AREA_META.runner.color, padding: "14px 16px" }}>
          <div style={{ ...btwn, marginBottom: 8 }}>
            <div style={row}><span style={{ fontSize: 20 }}>🏃</span><div><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>러너</div><div style={{ fontSize: 10, color: C.textLight }}>{curStage.label} 단계</div></div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>{conn.emoji}</span><span style={{ fontSize: 11, fontWeight: 700, color: conn.color }}>{conn.label}</span></div>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>오늘 루틴</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.runner.color }}>{ac.done}/{ac.total}</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>이번주 거리</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.runner.color }}>{wKm.toFixed(1)}km</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>누적</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.runner.color }}>{Math.round(totKm)}km</div></div>
          </div>
          <div style={{ background: C.grayXL, borderRadius: 4, height: 4, overflow: "hidden" }}><div style={{ width: acPct + "%", height: "100%", background: AREA_META.runner.color, borderRadius: 4 }} /></div>
        </div>;
      })()}

      {/* 작가 연결 */}
      {(function () {
        var ac = areaRoutineCounts.writer;
        var acPct = ac.total > 0 ? Math.round(ac.done / ac.total * 100) : 0;
        var conn = connectionLevel(acPct);
        return <div style={{ ...card, borderLeft: "4px solid " + AREA_META.writer.color, padding: "14px 16px" }}>
          <div style={{ ...btwn, marginBottom: 8 }}>
            <div style={row}><span style={{ fontSize: 20 }}>✒️</span><div><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>작가</div><div style={{ fontSize: 10, color: C.textLight }}>{novel.title || "작품 준비 중"}</div></div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>{conn.emoji}</span><span style={{ fontSize: 11, fontWeight: 700, color: conn.color }}>{conn.label}</span></div>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>오늘 루틴</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.writer.color }}>{ac.done}/{ac.total}</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>아이디어</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.writer.color }}>{(wd.ideas || []).length}개</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>작품 진행</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.writer.color }}>{novelPct}%</div></div>
          </div>
          <div style={{ background: C.grayXL, borderRadius: 4, height: 4, overflow: "hidden" }}><div style={{ width: acPct + "%", height: "100%", background: AREA_META.writer.color, borderRadius: 4 }} /></div>
        </div>;
      })()}

      {/* 경제 연결 */}
      {(function () {
        var ac = areaRoutineCounts.finance;
        var acPct = ac.total > 0 ? Math.round(ac.done / ac.total * 100) : 0;
        var conn = connectionLevel(acPct);
        // 경제는 루틴이 없을 수 있으므로, 자산 데이터로 보완
        var hasFinData = fd.transactions.length > 0 || fd.assets.length > 0;
        return <div style={{ ...card, borderLeft: "4px solid " + AREA_META.finance.color, padding: "14px 16px" }}>
          <div style={{ ...btwn, marginBottom: 8 }}>
            <div style={row}><span style={{ fontSize: 20 }}>💰</span><div><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>경제</div><div style={{ fontSize: 10, color: C.textLight }}>{ac.total > 0 ? "재테크 루틴 진행 중" : "루틴 추가로 습관 강화"}</div></div></div>
            {ac.total > 0 ? <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>{conn.emoji}</span><span style={{ fontSize: 11, fontWeight: 700, color: conn.color }}>{conn.label}</span></div>
              : hasFinData && <span style={{ fontSize: 11, fontWeight: 700, color: AREA_META.finance.color }}>📊 관리 중</span>}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>순자산</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.finance.color }}>{formatMoney(netAsset)}</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>투자수익</div><div style={{ fontSize: 14, fontWeight: 700, color: stockRet >= 0 ? C.green : C.red }}>{stockRet >= 0 ? "+" : ""}{stockRet.toFixed(1)}%</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>자산 수</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.finance.color }}>{fd.assets.length + fd.portfolio.length}</div></div>
          </div>
          {ac.total > 0 && <div style={{ background: C.grayXL, borderRadius: 4, height: 4, overflow: "hidden" }}><div style={{ width: acPct + "%", height: "100%", background: AREA_META.finance.color, borderRadius: 4 }} /></div>}
        </div>;
      })()}

      {/* 산약초 연결 */}
      {(function () {
        var ac = areaRoutineCounts.nature;
        var acPct = ac.total > 0 ? Math.round(ac.done / ac.total * 100) : 0;
        var conn = connectionLevel(acPct);
        return <div style={{ ...card, borderLeft: "4px solid " + AREA_META.nature.color, padding: "14px 16px" }}>
          <div style={{ ...btwn, marginBottom: 8 }}>
            <div style={row}><span style={{ fontSize: 20 }}>🌿</span><div><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>산약초</div><div style={{ fontSize: 10, color: C.textLight }}>{lastForage ? "최근: " + fmtDate(lastForage.date) + " " + lastForage.mountain : "산행을 시작하세요"}</div></div></div>
            {ac.total > 0 ? <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>{conn.emoji}</span><span style={{ fontSize: 11, fontWeight: 700, color: conn.color }}>{conn.label}</span></div>
              : <span style={{ fontSize: 11, fontWeight: 700, color: AREA_META.nature.color }}>🌿 {totalHerbLogs}회</span>}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>약초산행</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.nature.color }}>{totalHerbLogs}회</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>이번달</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.nature.color }}>{thisMonthLogs.length}회</div></div>
            <div style={{ flex: 1, background: C.grayXL, borderRadius: 8, padding: "6px 10px" }}><div style={{ fontSize: 9, color: C.textLight }}>재배중</div><div style={{ fontSize: 14, fontWeight: 700, color: AREA_META.nature.color }}>{totalCultivation}종</div></div>
          </div>
          {ac.total > 0 && <div style={{ background: C.grayXL, borderRadius: 4, height: 4, overflow: "hidden" }}><div style={{ width: acPct + "%", height: "100%", background: AREA_META.nature.color, borderRadius: 4 }} /></div>}
          <div style={{ fontSize: 10, color: C.textLight, marginTop: 6 }}>🏃 트레일런 + 약초산행 = 산에서의 삶</div>
        </div>;
      })()}

      {/* 생활 기반 */}
      {(function () {
        var ac = areaRoutineCounts.life;
        var acPct = ac.total > 0 ? Math.round(ac.done / ac.total * 100) : 0;
        var conn = connectionLevel(acPct);
        return <div style={{ ...card, borderLeft: "4px solid " + AREA_META.life.color, padding: "14px 16px" }}>
          <div style={{ ...btwn, marginBottom: 4 }}>
            <div style={row}><span style={{ fontSize: 20 }}>🌱</span><div><div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>생활 기반</div><div style={{ fontSize: 10, color: C.textLight }}>기상 · 물 · 정리 · 수면</div></div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 14 }}>{conn.emoji}</span><span style={{ fontSize: 11, fontWeight: 700, color: conn.color }}>{ac.done}/{ac.total}</span></div>
          </div>
          <div style={{ background: C.grayXL, borderRadius: 4, height: 4, overflow: "hidden" }}><div style={{ width: acPct + "%", height: "100%", background: AREA_META.life.color, borderRadius: 4 }} /></div>
        </div>;
      })()}

      {/* ═══ 3. 로또 ═══ */}
      <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 8, marginTop: 6 }}>🎰 이번 주 로또</div>
      <div style={card}>
        <div style={{ ...btwn, marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: C.textLight }}>{fmtDate(WEEK_START) + " ~ " + fmtDate(WEEK_DAYS[6])}</div>
          <button onClick={genLotto} disabled={llod} style={{ ...btnP, fontSize: 11, padding: "5px 12px", opacity: llod ? 0.7 : 1 }}>{llod ? "분석 중..." : rec ? "재생성" : "번호 생성"}</button>
        </div>
        {!rec && !llod && <div style={{ textAlign: "center", padding: "10px 0", fontSize: 12, color: C.textLight }}>버튼을 눌러 추천번호를 받아보세요</div>}
        {llod && <div style={{ textAlign: "center", padding: "14px 0", fontSize: 12, color: C.textMid }}>분석 중... (10~20초)</div>}
        {rec && !llod && <div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", marginBottom: 8 }}>
            {ln.map(function (lnum) { return <LottoBall key={lnum} lnum={lnum} />; })}
            {rec.bonus != null && <span style={{ color: C.textLight, fontSize: 12 }}>+</span>}
            {rec.bonus != null && <LottoBall lnum={rec.bonus} outline />}
          </div>
          {rec.latestRound && <div style={{ background: C.grayXL, borderRadius: 10, padding: "8px 12px", marginBottom: 6 }}>
            <div style={{ fontSize: 10, color: C.textLight, marginBottom: 4 }}>{rec.latestRound}회 최근 당첨번호</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
              {ll.map(function (lnum) { return <LottoBall key={lnum} lnum={lnum} size={28} />; })}
              {rec.latestBonus != null && <span style={{ fontSize: 11, color: C.textLight }}>+</span>}
              {rec.latestBonus != null && <LottoBall lnum={rec.latestBonus} size={28} outline />}
            </div>
          </div>}
          {rec.analysis && <div style={{ fontSize: 11, color: C.textMid, lineHeight: 1.5 }}>{rec.analysis}</div>}
        </div>}
      </div>

      {/* ═══ 4. 월간 메모 ═══ */}
      <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 8, marginTop: 6 }}>📆 {YEAR}년 월간 기록 <span style={{ fontSize: 12, fontWeight: 400, color: C.textLight }}>{filledMonths}/12</span></div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 4, marginBottom: 10 }}>
        {MN.map(function (mn, mi) {
          var hasMemo = getMonthMemo(mi).length > 0;
          var isCur = mi === curMonth;
          var isExp = mi === expandMonth;
          return <button key={mi} onClick={function () { setExpandMonth(mi); }} style={{ padding: "6px 2px", borderRadius: 8, border: "1.5px solid " + (isExp ? C.purple : isCur ? C.green : C.border), background: isExp ? C.purpleL : isCur ? "#f0fdf4" : "white", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 11, fontWeight: isExp ? 700 : 500, color: isExp ? C.purple : isCur ? C.green : C.text }}>{mn}</div>
            {hasMemo && <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.purple, margin: "3px auto 0" }} />}
          </button>;
        })}
      </div>
      <MonthMemoCard mi={expandMonth} monthlyData={monthlyData} setMonthMemo={setMonthMemo} label={MN[expandMonth]} isCur={expandMonth === curMonth} />

      {/* ═══ 5. 연간 목표 (영역 태그 + 누적) ═══ */}
      <div style={{ ...btwn, marginBottom: 8, marginTop: 6 }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>🎯 연간 목표</div>
        <div style={{ fontSize: 12, color: C.textLight }}>{doneGoals}/{totalGoals} 달성</div>
      </div>
      <div style={{ ...card, border: "2px solid " + C.purple }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
          <select value={goalYear} onChange={function (e) { setGoalYear(Number(e.target.value)); }} style={{ ...inp, width: 80, flex: "none", fontSize: 13, padding: "8px 6px" }}>
            {Array.from({ length: 5 }, function (_, i) { return YEAR - 2 + i; }).map(function (y) { return <option key={y} value={y}>{y}</option>; })}
          </select>
          <div style={{ display: "flex", gap: 3 }}>
            {Object.keys(AREA_META).map(function (ak) {
              var am = AREA_META[ak];
              return <button key={ak} onClick={function () { setGoalArea(ak); }} style={{ width: 32, height: 32, borderRadius: 8, border: "1.5px solid " + (goalArea === ak ? am.color : C.border), background: goalArea === ak ? am.color + "18" : "white", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>{am.icon}</button>;
            })}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={goalTxt} onChange={function (e) { setGoalTxt(e.target.value); }} placeholder="새 목표" style={{ ...inp, flex: 1 }} onKeyDown={function (e) { if (e.key === "Enter") addGoal(); }} />
          <button onClick={addGoal} style={{ ...btnP, flexShrink: 0 }}>추가</button>
        </div>
      </div>

      {allYears.slice().reverse().map(function (y) {
        var yr = getYearData(y);
        var goals = yr.goals || [];
        if (goals.length === 0) return null;
        var doneCnt = goals.filter(function (g) { return g.done; }).length;
        var pct = Math.round(doneCnt / goals.length * 100);
        var isCY = y === YEAR;
        return <div key={y} style={{ ...card, borderLeft: "4px solid " + (isCY ? C.purple : C.textLight) }}>
          <div style={{ ...btwn, marginBottom: 8 }}>
            <div><div style={{ fontSize: 14, fontWeight: 700, color: isCY ? C.purple : C.text }}>{y}년</div><div style={{ fontSize: 11, color: C.textLight }}>{doneCnt}/{goals.length} 달성</div></div>
            <div style={{ fontSize: 18, fontWeight: 700, color: pct === 100 ? C.green : isCY ? C.purple : C.textMid }}>{pct}%</div>
          </div>
          <div style={{ background: C.grayXL, borderRadius: 4, height: 6, overflow: "hidden", marginBottom: 10 }}>
            <div style={{ width: pct + "%", height: "100%", background: pct === 100 ? C.green : isCY ? "linear-gradient(90deg,#4338ca,#6366f1)" : C.textLight, borderRadius: 4 }} />
          </div>
          {goals.map(function (gl) {
            var gArea = gl.area || "life";
            var gam = AREA_META[gArea] || AREA_META.life;
            return <div key={gl.id} style={{ ...btwn, marginBottom: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <button onClick={function () { toggleGoal(y, gl.id); }} style={{ width: 22, height: 22, borderRadius: "50%", border: "2px solid " + (gl.done ? C.green : C.border), background: gl.done ? C.green : "white", color: "white", cursor: "pointer", fontSize: 11, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{gl.done ? "✓" : ""}</button>
                <span style={{ fontSize: 12, flexShrink: 0 }}>{gam.icon}</span>
                <span style={{ fontSize: 13, color: gl.done ? C.textLight : C.text, textDecoration: gl.done ? "line-through" : "none" }}>{gl.text}</span>
              </div>
              <button onClick={function () { delGoal(y, gl.id); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.textLight, fontSize: 16 }}>×</button>
            </div>;
          })}
        </div>;
      })}
      {totalGoals === 0 && <div style={{ ...card, textAlign: "center", padding: "20px", color: C.textLight, fontSize: 12 }}>첫 번째 목표를 추가해보세요</div>}
    </div>
  );
}

function MonthMemoCard(props) {
  var mi = props.mi, monthlyData = props.monthlyData, setMonthMemo = props.setMonthMemo, label = props.label, isCur = props.isCur;
  var k = YEAR + "-" + String(mi + 1).padStart(2, "0");
  var initVal = (monthlyData[k] && monthlyData[k].notes) || "";
  var [val, setVal] = useState(initVal);
  useEffect(function () {
    var nk = YEAR + "-" + String(mi + 1).padStart(2, "0");
    setVal((monthlyData[nk] && monthlyData[nk].notes) || "");
  }, [mi]);
  function onChange(e) { setVal(e.target.value); setMonthMemo(mi, e.target.value); }
  return (
    <div style={{ ...card, borderLeft: "4px solid " + (isCur ? C.green : C.purple) }}>
      <div style={{ ...btwn, marginBottom: 6 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: isCur ? C.green : C.purple }}>{label} {isCur && <span style={{ fontSize: 10, fontWeight: 400, color: C.textLight }}>· 이번 달</span>}</div>
        <div style={{ fontSize: 10, color: C.textLight }}>자동 저장</div>
      </div>
      <textarea value={val} onChange={onChange} placeholder={label + " 기록, 목표, 회고..."} style={{ ...inp, height: 80, resize: "vertical", border: "none", padding: 0, lineHeight: 1.6 }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
